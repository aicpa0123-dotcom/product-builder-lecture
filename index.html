
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Multi App</title>
    <meta name="google-adsense-account" content="ca-pub-7484262315106179">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7484262315106179"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="top-controls">
            <button id="lang-toggle">한국어</button>
            <button id="theme-toggle">Dark Mode</button>
        </div>
        
        <nav class="tab-menu">
            <button class="tab-btn active" data-target="animal-test-section" data-i18n="animalTab">Animal Face Test</button>
            <button class="tab-btn" data-target="lotto-section" data-i18n="lottoTab">Lotto Generator</button>
        </nav>

        <section id="animal-test-section" class="content-section active">
            <h1 data-i18n="animalTitle">AI Animal Face Test</h1>
            <p data-i18n="animalSubtitle">Am I a Dog or a Cat?</p>
            
            <div class="upload-container" id="upload-area">
                <input type="file" id="image-input" accept="image/*" hidden>
                <div class="upload-label">
                    <img src="https://img.icons8.com/ios/100/000000/upload--v1.png" alt="upload icon" id="upload-icon">
                    <p id="upload-text" data-i18n="uploadText">Click or Drag to Upload Face</p>
                </div>
                <img id="face-image" src="#" alt="your image" hidden>
            </div>

            <div id="loading-spinner" data-i18n="analyzing" hidden>Analyzing...</div>
            <div id="result-container" hidden>
                <div class="result-message" id="result-message"></div>
                <div id="label-container"></div>
            </div>
        </section>

        <section id="lotto-section" class="content-section">
            <h1 data-i18n="lottoTitle">Lotto Number Generator</h1>
            <div class="numbers-container"></div>
            <button id="generate-btn" data-i18n="generateBtn">Generate Numbers</button>
        </section>

        <hr class="divider">

        <div class="contact-form-container">
            <h2 data-i18n="contactTitle">Partnership Inquiry</h2>
            <form action="https://formspree.io/f/mnjgrnlo" method="POST">
                <div class="form-group">
                    <label for="full-name" data-i18n="nameLabel">Name</label>
                    <input type="text" name="name" id="full-name" data-i18n-placeholder="namePlaceholder" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email-address" data-i18n="emailLabel">Email</label>
                    <input type="email" name="_replyto" id="email-address" data-i18n-placeholder="emailPlaceholder" placeholder="email@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="message" data-i18n="messageLabel">Message</label>
                    <textarea name="message" id="message" data-i18n-placeholder="messagePlaceholder" placeholder="How can we help?" required></textarea>
                </div>
                <button type="submit" id="submit-btn" data-i18n="sendBtn">Send Message</button>
            </form>
        </div>

        <hr class="divider">

        <div id="disqus_thread"></div>
        <script>
            (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://product-builder-lecture.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
    </div>
    <script src="main.js"></script>
</body>
</html>
