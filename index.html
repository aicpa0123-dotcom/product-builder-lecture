
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle">Dark Mode</button>
        <h1>Lotto Number Generator</h1>
        <div class="numbers-container"></div>
        <button id="generate-btn">Generate Numbers</button>

        <hr class="divider">

        <div class="contact-form-container">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/mnjgrnlo" method="POST">
                <div class="form-group">
                    <label for="full-name">Name</label>
                    <input type="text" name="name" id="full-name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email-address">Email</label>
                    <input type="email" name="_replyto" id="email-address" placeholder="email@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" placeholder="How can we help?" required></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Message</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
