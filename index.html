
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Animal Face Test</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <button id="theme-toggle">Dark Mode</button>
        
        <section class="animal-test-section">
            <h1>AI Animal Face Test</h1>
            <p>Am I a Dog or a Cat?</p>
            
            <div class="upload-container" id="upload-area">
                <input type="file" id="image-input" accept="image/*" hidden>
                <div class="upload-label">
                    <img src="https://img.icons8.com/ios/100/000000/upload--v1.png" alt="upload icon" id="upload-icon">
                    <p id="upload-text">Click or Drag to Upload Face</p>
                </div>
                <img id="face-image" src="#" alt="your image" hidden>
            </div>

            <div id="loading-spinner" hidden>Analyzing...</div>
            <div id="result-container" hidden>
                <div class="result-message" id="result-message"></div>
                <div id="label-container"></div>
            </div>
        </section>

        <hr class="divider">

        <section class="lotto-section">
            <h1>Lotto Number Generator</h1>
            <div class="numbers-container"></div>
            <button id="generate-btn">Generate Numbers</button>
        </section>

        <hr class="divider">

        <div class="contact-form-container">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/mnjgrnlo" method="POST">
                <div class="form-group">
                    <label for="full-name">Name</label>
                    <input type="text" name="name" id="full-name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email-address">Email</label>
                    <input type="email" name="_replyto" id="email-address" placeholder="email@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" placeholder="How can we help?" required></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Message</button>
            </form>
        </div>

        <hr class="divider">

        <div id="disqus_thread"></div>
        <script>
            (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://product-builder-lecture.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
    </div>
    <script src="main.js"></script>
</body>
</html>
